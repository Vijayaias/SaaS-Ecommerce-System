<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Cancelled</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: "Manrope", sans-serif;
            background:
                radial-gradient(circle at top, rgba(166, 61, 47, 0.18), transparent 30%),
                linear-gradient(180deg, #fff7f5 0%, #f8ece8 100%);
            color: #4b1f17;
        }

        .card {
            width: min(560px, calc(100vw - 32px));
            padding: 36px;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.88);
            border: 1px solid rgba(75, 31, 23, 0.1);
            box-shadow: 0 24px 60px rgba(166, 61, 47, 0.12);
            text-align: center;
        }

        .badge {
            width: 76px;
            height: 76px;
            margin: 0 auto 18px;
            border-radius: 50%;
            display: grid;
            place-items: center;
            font-size: 2rem;
            background: linear-gradient(135deg, #a63d2f 0%, #cc6251 100%);
            color: #fff;
        }

        h1 {
            margin: 0 0 10px;
            font-size: clamp(2rem, 5vw, 2.8rem);
        }

        p {
            margin: 0 0 24px;
            color: #7c554d;
            line-height: 1.7;
        }

        a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 170px;
            padding: 14px 18px;
            border-radius: 16px;
            text-decoration: none;
            font-weight: 800;
            color: #fff;
            background: linear-gradient(135deg, #a63d2f 0%, #cc6251 100%);
        }
    </style>
</head>
<body>
<section class="card">
    <div class="badge">!</div>
    <h1>Payment Cancelled</h1>
    <p>Your payment was not completed this time. You can return to the cart, review the order, and try checkout again.</p>
    <a href="/cart">Back to Cart</a>
</section>
</body>
</html>
