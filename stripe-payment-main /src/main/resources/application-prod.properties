spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=false
spring.jpa.show-sql=false

spring.application.name=stripe-payment

stripe.secretKey=${STRIPE_SECRET_KEY}
stripe.webhookSecret=${STRIPE_WEBHOOK_SECRET}
app.base-url=${APP_BASE_URL}

spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9094}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.consumer.group-id=${SPRING_KAFKA_CONSUMER_GROUP_ID:stripe-payment-group}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.listener.missing-topics-fatal=false
spring.kafka.producer.properties.max.block.ms=1000

spring.data.redis.host=${SPRING_DATA_REDIS_HOST}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.timeout=2s

app.kafka.enabled=${APP_KAFKA_ENABLED:false}
app.kafka.topics.order-events=${APP_KAFKA_ORDER_TOPIC:order-events}
app.kafka.topics.payment-events=${APP_KAFKA_PAYMENT_TOPIC:payment-events}
app.redis.enabled=${APP_REDIS_ENABLED:true}
app.redis.payment-idempotency-ttl-minutes=30
app.redis.cancel-lock-ttl-seconds=120
app.redis.webhook-lock-ttl-minutes=30
app.redis.notification-lock-ttl-minutes=1440

app.mail.enabled=${APP_MAIL_ENABLED:false}
app.mail.from=${MAIL_FROM:no-reply@bharathiecommerce.com}
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}

logging.file.name=${LOG_FILE_NAME:/var/log/stripe-payment/application.log}
logging.logback.rollingpolicy.max-file-size=${LOG_MAX_FILE_SIZE:25MB}
logging.logback.rollingpolicy.max-history=${LOG_MAX_HISTORY:30}
