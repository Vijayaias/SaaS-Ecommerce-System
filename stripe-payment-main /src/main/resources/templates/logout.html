<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout Studio | Logout</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,600,0,0" rel="stylesheet">
    <link rel="stylesheet" href="/css/storefront.css">
</head>
<body data-page="logout">
<div class="page-shell">
    <section id="logout-card" class="logout-card">
        <div class="icon-hero danger">
            <span class="material-symbols-outlined">logout</span>
        </div>
        <h1>You are logged out</h1>
        <p class="hero-copy" style="margin: 0 auto 24px; text-align: center; max-width: 46ch;">
            Your session token and saved cart were cleared from this browser. You can go back home and sign in again whenever you are ready.
        </p>
        <div class="cta-row">
            <a id="logout-home-link" class="btn btn-primary" href="/">Back To Home</a>
            <a class="btn btn-secondary" href="/products">Browse Products</a>
        </div>
    </section>
</div>
<script src="/js/storefront.js"></script>
</body>
</html>
